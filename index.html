<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Studio di Osteopatia – Genova</title>

  <!-- Prevent indexing -->
  <meta name="robots" content="noindex, nofollow">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #faf8fd;
      --ink: #211f27;
      --muted: #6b6575;
      --accent: #a986e8;
      --accent-dark: #6d50a7;
      --white: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Inter", sans-serif;
      background: var(--bg);
      color: var(--ink);
      overflow-x: hidden;
    }

    .wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
    }

    /* Animated background */
    .bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 30%, rgba(169,134,232,0.25), transparent 40%),
                  radial-gradient(circle at 70% 70%, rgba(169,134,232,0.2), transparent 50%);
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--white);
      padding: 60px 40px;
      border-radius: 20px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.08);
      text-align: center;
      max-width: 520px;
      width: 100%;
    }

    .eyebrow {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--accent-dark);
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    h1 {
      font-size: clamp(2.2rem, 5vw, 3.2rem);
      margin-bottom: 10px;
      line-height: 1.1;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 25px;
    }

    .line {
      width: 50px;
      height: 3px;
      background: var(--accent);
      margin: 0 auto 25px;
      border-radius: 2px;
    }

    .coming {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--accent-dark);
    }

    /* Floating effect */
    .floating {
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* Mobile */
    @media(max-width:600px){
      .card {
        padding: 40px 24px;
      }
    }

  </style>
</head>
<body>

<div class="wrapper">
  <div class="bg"></div>

  <div class="card floating">
    <div class="eyebrow">Genova</div>

    <h1>Studio di Osteopatia</h1>

    <div class="subtitle">
      Fisioterapia e trattamenti personalizzati
    </div>

    <div class="line"></div>

    <div class="coming">
      Sito in aggiornamento
    </div>
  </div>
</div>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<script>
  // Entrance animation
  gsap.from(".card", {
    opacity: 0,
    y: 50,
    duration: 1,
    ease: "power3.out"
  });

  gsap.from("h1", {
    opacity: 0,
    y: 20,
    delay: 0.3,
    duration: 0.8,
    ease: "power3.out"
  });

  gsap.from(".subtitle", {
    opacity: 0,
    y: 15,
    delay: 0.5,
    duration: 0.6
  });

  gsap.from(".line", {
    scaleX: 0,
    transformOrigin: "center",
    delay: 0.7,
    duration: 0.6,
    ease: "power2.out"
  });

  gsap.from(".coming", {
    opacity: 0,
    y: 10,
    delay: 0.9,
    duration: 0.6
  });

  // subtle background motion
  gsap.to(".bg", {
    backgroundPosition: "200% 200%",
    duration: 20,
    repeat: -1,
    ease: "none"
  });
</script>

</body>
</html>
